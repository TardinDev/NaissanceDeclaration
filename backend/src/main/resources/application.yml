spring:
  application:
    name: declaration-naissance-api

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/declaration_naissance?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

server:
  port: ${PORT:8080}
  servlet:
    context-path: /api/v1

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET:my-super-secret-key-for-jwt-that-is-at-least-256-bits-long-for-security}
      expiration: 86400000 # 24 heures en millisecondes

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
